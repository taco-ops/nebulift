# Production Nebulift Training Configuration
learning_rate=0.0005
batch_size=64
epochs=100
num_workers=8

# Data paths (mounted volumes) - Production NFS
train_data_path=/data/production/train
val_data_path=/data/production/val
model_output_path=/models/production

# Distributed training config - Production optimized
backend=gloo
init_method=env://
timeout=3600

# Quality thresholds - Production values
quality_threshold=0.8
contamination_threshold=0.2

# Model architecture - Production configuration
model_name=resnet18
num_classes=2
dropout_rate=0.3

# Logging - Production settings
log_level=INFO
checkpoint_interval=5
save_best_model=true
early_stopping_patience=15

# Resource limits for Production RPi5 cluster
memory_limit=4Gi
cpu_limit=3
gpu_enabled=false

# Monitoring and alerting
enable_metrics=true
metrics_port=8080
enable_profiling=false
