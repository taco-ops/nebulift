apiVersion: batch/v1
kind: Job
metadata:
  name: nebulift-training
  labels:
    environment: development
spec:
  parallelism: 2  # Minimal for development
  completions: 2
  backoffLimit: 5  # More forgiving for development
  template:
    spec:
      containers:
        - name: nebulift-trainer
          resources:
            requests:
              memory: "512Mi"
              cpu: "0.5"
            limits:
              memory: "1Gi"
              cpu: "1"
          env:
            - name: WORLD_SIZE
              value: "2"
            - name: ENVIRONMENT
              value: "development"
            - name: LOG_LEVEL
              value: "DEBUG"
            - name: DEBUG_MODE
              value: "true"
          volumeMounts:
            - name: training-data
              mountPath: /data
              readOnly: true
            - name: model-storage
              mountPath: /models
            - name: local-cache
              mountPath: /tmp/cache
      volumes:
        - name: training-data
          nfs:
            server: 10.42.0.22
            path: /exports/cluster-storage/nebulift/dev/data
        - name: model-storage
          nfs:
            server: 10.42.0.22
            path: /exports/cluster-storage/nebulift/dev/models
        - name: local-cache
          emptyDir:
            sizeLimit: 5Gi
