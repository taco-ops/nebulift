# Development Nebulift Training Configuration
learning_rate=0.01
batch_size=16
epochs=10
num_workers=2

# Data paths (mounted volumes) - Development
train_data_path=/data/dev/train
val_data_path=/data/dev/val
model_output_path=/models/dev

# Distributed training config - Development
backend=gloo
init_method=env://
timeout=1800

# Quality thresholds - Relaxed for development
quality_threshold=0.6
contamination_threshold=0.4

# Model architecture - Fast training for development
model_name=resnet18
num_classes=2
dropout_rate=0.5

# Logging - Verbose for development
log_level=DEBUG
checkpoint_interval=2
save_best_model=false
early_stopping_patience=5

# Resource limits for Development
memory_limit=1Gi
cpu_limit=1
gpu_enabled=false

# Development features
enable_metrics=true
metrics_port=8080
enable_profiling=true
debug_mode=true
