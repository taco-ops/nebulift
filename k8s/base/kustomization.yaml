apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: nebulift-base
  annotations:
    config.kubernetes.io/local-config: "true"

resources:
  - configmap.yaml
  - service.yaml
  - training-job.yaml

commonLabels:
  app.kubernetes.io/name: nebulift
  app.kubernetes.io/component: ml-training
  app.kubernetes.io/part-of: nebulift
  app.kubernetes.io/managed-by: argocd

commonAnnotations:
  app.kubernetes.io/version: "latest"

images:
  - name: ghcr.io/taco-ops/nebulift
    newTag: latest
