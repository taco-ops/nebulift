apiVersion: batch/v1
kind: Job
metadata:
  name: nebulift-training
  labels:
    app: nebulift-training
spec:
  parallelism: 4  # Number of training pods (adjust for RPi5 cluster size)
  completions: 4
  completionMode: Indexed  # Enable indexed job for proper rank assignment
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: nebulift-training
    spec:
      restartPolicy: Never

      # Use node affinity to distribute across RPi5 nodes
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - nebulift-training
                topologyKey: kubernetes.io/hostname

      containers:
        - name: nebulift-trainer
          image: ghcr.io/taco-ops/nebulift:latest  # Use latest published image
          imagePullPolicy: IfNotPresent

          command: ["python", "-m", "nebulift.distributed.k8s_trainer"]

          env:
            # Distributed training environment
            - name: WORLD_SIZE
              value: "4"  # Total number of processes
            - name: RANK
              valueFrom:
                fieldRef:
                  fieldPath: metadata.annotations['batch.kubernetes.io/job-completion-index']
            - name: MASTER_ADDR
              value: "nebulift-training-coordinator"
            - name: MASTER_PORT
              value: "29500"

            # Training configuration from ConfigMap
            - name: LEARNING_RATE
              valueFrom:
                configMapKeyRef:
                  name: nebulift-training-config
                  key: learning_rate
            - name: BATCH_SIZE
              valueFrom:
                configMapKeyRef:
                  name: nebulift-training-config
                  key: batch_size
            - name: EPOCHS
              valueFrom:
                configMapKeyRef:
                  name: nebulift-training-config
                  key: epochs
            - name: TRAIN_DATA_PATH
              valueFrom:
                configMapKeyRef:
                  name: nebulift-training-config
                  key: train_data_path
            - name: VAL_DATA_PATH
              valueFrom:
                configMapKeyRef:
                  name: nebulift-training-config
                  key: val_data_path
            - name: MODEL_OUTPUT_PATH
              valueFrom:
                configMapKeyRef:
                  name: nebulift-training-config
                  key: model_output_path

          resources:
            requests:
              memory: "1Gi"
              cpu: "1"
            limits:
              memory: "2Gi"
              cpu: "2"

          volumeMounts:
            - name: training-data
              mountPath: /data
              readOnly: true
            - name: model-storage
              mountPath: /models
            - name: local-cache
              mountPath: /tmp/cache

      volumes:
        # Use emptyDir for now (NFS server not configured)
        - name: training-data
          emptyDir:
            sizeLimit: 10Gi
        - name: model-storage
          emptyDir:
            sizeLimit: 10Gi
        - name: local-cache
          emptyDir:
            sizeLimit: 10Gi  # Per-pod cache

      # Tolerations for RPi5 nodes
      tolerations:
        - key: "node.kubernetes.io/arch"
          operator: "Equal"
          value: "arm64"
          effect: "NoSchedule"
        - key: "kubernetes.io/arch"
          operator: "Equal"
          value: "arm64"
          effect: "NoSchedule"
