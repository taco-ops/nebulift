<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Nebulift local-first quality control workflow</title>
  <desc id="desc">A one-page architecture diagram showing FITS input, computer vision analysis, optional model inference, manifest review, evaluation, training, and model promotion.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #d8e1ee; stroke-width: 2; }
      .source { fill: #eaf3ff; stroke: #8cb9f3; }
      .process { fill: #edfdf5; stroke: #78c9a1; }
      .review { fill: #fff7df; stroke: #e9c665; }
      .model { fill: #f1edff; stroke: #a99bea; }
      .warn { fill: #fff0ed; stroke: #e89483; }
      .store { fill: #edf2f7; stroke: #9aaec4; }
      .title { font: 700 34px Arial, sans-serif; fill: #172033; }
      .subtitle { font: 400 17px Arial, sans-serif; fill: #536173; }
      .section { font: 700 18px Arial, sans-serif; fill: #172033; }
      .label { font: 700 16px Arial, sans-serif; fill: #1f2937; }
      .body { font: 400 13px Arial, sans-serif; fill: #4b5563; }
      .badge { font: 700 12px Arial, sans-serif; fill: #334155; }
      .arrow { stroke: #607089; stroke-width: 2.5; fill: none; marker-end: url(#arrowhead); }
      .arrow-soft { stroke: #94a3b8; stroke-width: 2; fill: none; marker-end: url(#arrowhead-soft); stroke-dasharray: 6 5; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#607089" />
    </marker>
    <marker id="arrowhead-soft" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#94a3b8" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1280" height="760" />
  <text class="title" x="64" y="62">How Nebulift Works</text>
  <text class="subtitle" x="64" y="92">Local-first FITS quality control: explain decisions, review labels, train better models, then promote trusted checkpoints.</text>

  <!-- Main online workflow -->
  <g id="main-workflow">
    <text class="section" x="64" y="142">1. Sort a session</text>

    <rect class="source" x="64" y="165" width="170" height="118" rx="18" />
    <text class="label" x="88" y="198">FITS Session</text>
    <text class="body" x="88" y="225">Raw telescope frames</text>
    <text class="body" x="88" y="246">.fits .fit .fts</text>
    <text class="body" x="88" y="267">Originals preserved</text>

    <path class="arrow" d="M238 224 H300" />

    <rect class="process" x="304" y="165" width="190" height="118" rx="18" />
    <text class="label" x="328" y="198">CV Analysis</text>
    <text class="body" x="328" y="225">Normalize FITS</text>
    <text class="body" x="328" y="246">Detect artifacts</text>
    <text class="body" x="328" y="267">Score quality</text>

    <path class="arrow" d="M498 224 H560" />

    <rect class="model" x="564" y="165" width="210" height="118" rx="18" />
    <text class="label" x="588" y="198">Optional Model</text>
    <text class="body" x="588" y="225">Promoted default or</text>
    <text class="body" x="588" y="246">explicit --model</text>
    <text class="body" x="588" y="267">Overrides decision</text>

    <path class="arrow" d="M778 224 H840" />

    <rect class="store" x="844" y="165" width="195" height="118" rx="18" />
    <text class="label" x="868" y="198">JSON Manifest</text>
    <text class="body" x="868" y="225">CV label</text>
    <text class="body" x="868" y="246">Decision label</text>
    <text class="body" x="868" y="267">Artifact evidence</text>

    <path class="arrow" d="M1043 224 H1105" />

    <rect class="review" x="1108" y="165" width="130" height="118" rx="18" />
    <text class="label" x="1129" y="198">Actions</text>
    <text class="body" x="1129" y="225">Report only</text>
    <text class="body" x="1129" y="246">or move files</text>
    <text class="body" x="1129" y="267">into buckets</text>
  </g>

  <!-- Manifest review loop -->
  <g id="review-loop">
    <text class="section" x="64" y="350">2. Review and measure quality</text>

    <rect class="review" x="64" y="373" width="222" height="126" rx="18" />
    <text class="label" x="88" y="406">Terminal Review</text>
    <text class="body" x="88" y="433">Correct labels</text>
    <text class="body" x="88" y="454">Optional file opening</text>
    <text class="body" x="88" y="475">Writes corrected_label</text>

    <path class="arrow" d="M290 436 H356" />

    <rect class="process" x="360" y="373" width="220" height="126" rx="18" />
    <text class="label" x="384" y="406">Evaluate Manifest</text>
    <text class="body" x="384" y="433">Accuracy</text>
    <text class="body" x="384" y="454">Confusion matrix</text>
    <text class="body" x="384" y="475">Precision / recall / F1</text>

    <path class="arrow" d="M584 436 H650" />

    <rect class="process" x="654" y="373" width="235" height="126" rx="18" />
    <text class="label" x="678" y="406">Calibrate Thresholds</text>
    <text class="body" x="678" y="433">Search CV thresholds</text>
    <text class="body" x="678" y="454">Use reviewed labels</text>
    <text class="body" x="678" y="475">Optimize macro F1</text>

    <path class="arrow-soft" d="M771 373 C771 330 941 330 941 287" />
    <text class="badge" x="816" y="324">better thresholds</text>
  </g>

  <!-- Training loop -->
  <g id="training-loop">
    <text class="section" x="64" y="565">3. Improve future decisions</text>

    <rect class="store" x="64" y="588" width="225" height="118" rx="18" />
    <text class="label" x="88" y="621">Curated Dataset</text>
    <text class="body" x="88" y="648">clean/</text>
    <text class="body" x="88" y="669">contaminated/</text>
    <text class="body" x="88" y="690">review/</text>

    <path class="arrow" d="M293 647 H356" />

    <rect class="model" x="360" y="588" width="226" height="118" rx="18" />
    <text class="label" x="384" y="621">Train Model</text>
    <text class="body" x="384" y="648">From FITS, manifest,</text>
    <text class="body" x="384" y="669">or curated folders</text>
    <text class="body" x="384" y="690">CPU-friendly ResNet18</text>

    <path class="arrow" d="M590 647 H656" />

    <rect class="model" x="660" y="588" width="218" height="118" rx="18" />
    <text class="label" x="684" y="621">Model Registry</text>
    <text class="body" x="684" y="648">Register checkpoint</text>
    <text class="body" x="684" y="669">Attach metrics</text>
    <text class="body" x="684" y="690">Promote default</text>

    <path class="arrow-soft" d="M769 588 C769 530 669 530 669 287" />
    <text class="badge" x="694" y="530">default model</text>
  </g>

  <!-- Tradeoff card -->
  <g id="tradeoffs">
    <rect class="panel" x="934" y="373" width="304" height="333" rx="22" />
    <text class="section" x="962" y="410">Design Tradeoffs</text>

    <rect class="source" x="962" y="432" width="248" height="58" rx="14" />
    <text class="label" x="984" y="456">Local first</text>
    <text class="body" x="984" y="476">Fast setup, limited cluster scale</text>

    <rect class="review" x="962" y="506" width="248" height="58" rx="14" />
    <text class="label" x="984" y="530">Human corrections</text>
    <text class="body" x="984" y="550">Better labels, review time required</text>

    <rect class="model" x="962" y="580" width="248" height="58" rx="14" />
    <text class="label" x="984" y="604">Promoted models</text>
    <text class="body" x="984" y="624">Convenient, must be evaluated</text>

    <rect class="warn" x="962" y="654" width="248" height="34" rx="14" />
    <text class="body" x="984" y="676">Kubernetes remains future scaffolding</text>
  </g>
</svg>
